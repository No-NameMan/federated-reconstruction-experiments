experiment:
  name: quick_colab_cpu_eval10_nobias_fedrecon_movielens
  seed: 42
  mode: quick
  output_dir: results/raw

data:
  dataset: movielens_1m
  data_dir: data
  min_ratings_per_user: 20
  user_split:
    train: 0.8
    val: 0.1
    test: 0.1
  support_fraction: 0.5
  split_seed: 42

model:
  embedding_dim: 32
  use_user_bias: false
  use_item_bias: false
  use_global_bias: false
  init_std: 0.05

federated:
  rounds: 30
  clients_per_round: 25
  client_dropout_prob: 0.0

reconstruction:
  steps: 5
  lr: 0.1
  optimizer: sgd

client_update:
  steps: 1
  lr: 0.05
  optimizer: sgd

server:
  optimizer: sgd
  lr: 1.0

compression:
  enabled: false
  method: none

evaluation:
  eval_every: 5
  max_eval_clients: 100
  reconstruction_steps: 10
  reconstruction_lr: 0.1
  eval_at_start: true

logging:
  checkpoint_every: 10