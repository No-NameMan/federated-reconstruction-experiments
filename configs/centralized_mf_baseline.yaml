experiment:
  name: centralized_mf_baseline
  seed: 42
  output_dir: results/raw

data:
  dataset: movielens_1m
  data_dir: data
  min_ratings_per_user: 20
  user_split:
    train: 0.8
    val: 0.1
    test: 0.1
  support_fraction: 0.5
  split_seed: 42

model:
  embedding_dim: 32
  use_user_bias: true
  use_item_bias: true
  use_global_bias: true
  init_std: 0.05

centralized:
  epochs: 20
  batch_size: 8192
  lr: 0.01
  optimizer: adam
  weight_decay: 0.0

evaluation:
  eval_every: 5
  max_eval_clients: 100
  max_final_eval_clients: all
  reconstruction_steps: 10
  reconstruction_lr: 0.1