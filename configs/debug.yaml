experiment:
  name: debug_fedrecon_movielens
  seed: 42
  mode: debug
  output_dir: results/raw

data:
  dataset: movielens_1m
  data_dir: data
  min_ratings_per_user: 20
  user_split:
    train: 0.8
    val: 0.1
    test: 0.1
  support_fraction: 0.5
  split_seed: 42

model:
  embedding_dim: 32
  use_user_bias: true
  use_item_bias: true
  init_std: 0.05

federated:
  rounds: 5
  clients_per_round: 10
  client_dropout_prob: 0.0

reconstruction:
  steps: 2
  lr: 0.1
  optimizer: sgd

client_update:
  steps: 1
  lr: 0.05
  optimizer: sgd

server:
  optimizer: sgd
  lr: 1.0

compression:
  enabled: false
  method: none

evaluation:
  eval_every: 1
  max_eval_clients: 50

logging:
  checkpoint_every: 5
